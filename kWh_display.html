<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Consumption Data</title>
    <style>
        /* Set a gradient background from left-bottom corner to right-top corner */
        body {
            background: linear-gradient(to top right, #3f1e5a, #1c2f5d); /* Gradient colors */
            color: #fefae0; /* Text color */
            font-family: Arial, sans-serif; /* Add a clean font */
            margin: 20px;
        }
        h1 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 15px;
}
        .filters {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        input, select {
    background-color: #fefae0;
    color: #000;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: Arial, sans-serif;
}

#backBtn {
    padding: 8px 16px;
    font-weight: bold;
    color: white;
    border: 1px solid #0b3d91;
    border-radius: 6px;
    cursor: pointer;

    /* 3D gradient background */
    background: linear-gradient(to bottom, #4facfe, #003f88);

    /* Light/gloss effect */
    box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.6),
        inset 0 -3px 6px rgba(0,0,0,0.4),
        0 4px 6px rgba(0,0,0,0.5);

    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);

    transition: all 0.2s ease;
}

#backBtn:hover {
    background: linear-gradient(to bottom, #6ec1ff, #0056b3);
    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.8),
        inset 0 -3px 6px rgba(0,0,0,0.5),
        0 6px 10px rgba(0,0,0,0.6);
}

#backBtn:active {
    transform: translateY(2px);
    box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.5);
}

#totalUnits {
    font-weight: bold;
    background-color: #d8f3dc;
    text-align: center;
}
        .table-container {
			overflow-x: auto;
			overflow-y: auto;
			max-height: 800px; /* adjust height as needed */
		}
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 auto;
        }
		
		/* Odd rows */
/* Ensure table text is black */
table tbody tr {
    color: black;
}

/* Odd rows */
.odd-row {
    background-color: #caf0f8;
}

/* Even rows */
.even-row {
    background-color: #fefae0;
}

/* Hover effect */
table tbody tr:hover {
    background-color: #f1f1f1;
}

/* Text color on hover */
table tbody tr:hover td {
    color: black;
}

/* Smooth transition */
table tbody tr {
    transition: background-color 0.3s ease, color 0.3s ease;
}
       th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: left;
}
		
		th {
    position: sticky;
    top: 0;
    background: linear-gradient(to bottom, #6ea8fe, #1c2f5d);
    color: white;
    border: 1px solid black;
    z-index: 10;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    box-shadow: inset 0 3px 5px rgba(255,255,255,0.5),
                inset 0 -3px 5px rgba(0,0,0,0.4),
                0 3px 6px rgba(0,0,0,0.4);
}
        @media (max-width: 600px) {
            .filters {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>ENERGY CONSUMPTION DATA</h1>
    <div class="filters">
    <select id="locationFilter">
        <option value="">All Locations</option>
    </select>

    <input type="text" id="yearFilter" placeholder="Filter by Year">

    <input type="text" id="totalUnits" placeholder="Total kWh" readonly>

    <button id="backBtn">BACK</button>
</div>
    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Location</th>
                    <th>Year_Month</th>
                    <th>Initial_Reading</th>
                    <th>Final_Reading</th>
                    <th>Voltage</th>
                    <th>Current</th>
                    <th>Total_Units</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be inserted here -->
            </tbody>
        </table>
    </div>

    <script>
        // Replace with your deployed Apps Script web app URL
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbztl7kUT23vvVxHJqGUH61JX9J6YTTqk7aEdsYOAP529LhaNRProsSMj82of2jylkwPdw/exec';

        let allData = [];

        async function fetchData() {
    try {
        const response = await fetch(`${scriptUrl}?mode=raw`);
        const text = await response.text();
        const json = JSON.parse(text);

        allData = (json.data || []).reverse();

        populateLocations(allData); // fill dropdown
        displayData(allData);

    } catch (error) {
        console.error('Error fetching data:', error);
    }
}

        function displayData(data) {
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = '';

    data.forEach((row, index) => {
        const tr = document.createElement('tr');

        // Apply odd/even row class
        if (index % 2 === 0) {
            tr.classList.add('even-row');
        } else {
            tr.classList.add('odd-row');
        }

        row.forEach(cell => {
            const td = document.createElement('td');
            td.textContent = cell;
            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

function populateLocations(data) {
    const locationSelect = document.getElementById("locationFilter");
    const locations = [...new Set(data.map(row => row[0]))]; // unique locations

    locations.forEach(loc => {
        const option = document.createElement("option");
        option.value = loc;
        option.textContent = loc;
        locationSelect.appendChild(option);
    });
}

        function filterData() {
    const locationValue = document.getElementById('locationFilter').value.toLowerCase();
    const yearValue = document.getElementById('yearFilter').value.trim();

    let totalUnits = 0;

    const filteredData = allData.filter(row => {
        const location = (row[0] || '').toLowerCase();
        const monthYear = row[1] || '';
        const year = monthYear.split('-')[0] || '';
        const units = parseFloat(row[6]) || 0;

        const locationMatch = locationValue === "" || location === locationValue;
        const yearMatch = yearValue === '' || year === yearValue;

        if (locationMatch && yearMatch) {
            totalUnits += units;
        }

        return locationMatch && yearMatch;
    });

    displayData(filteredData);

    // Display total
    document.getElementById("totalUnits").value = Math.round(totalUnits) + " kWh";
}

document.getElementById("backBtn").addEventListener("click", function () {
    window.location.href = "kWh Reading.html";
});

        // Add event listeners to filters
        document.getElementById('locationFilter').addEventListener('input', filterData);
        document.getElementById('yearFilter').addEventListener('input', filterData);

        // Fetch data on load
        fetchData();
    </script>
</body>
</html>
